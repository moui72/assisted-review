name: ArDD version badge sync

# Keeps .github/badges/ardd-version.json in sync with
# .project/ardd-version.md — regenerates the badge JSON whenever that file
# changes (via /ardd-update, a manual edit, or anything else that touches
# it), and commits only if the JSON actually differs.
#
# Upstream ArDD's template (templates/ardd-badge-workflow.yml) targets a
# shields.io *endpoint* badge, which consumes label/message/color/labelColor/
# logoSvg from this JSON. The README here renders it through shieldcn instead,
# to match the rest of the badge row, and shieldcn's dynamic/json reads only
# `message` — label, colour, and logo ride the badge URL as query params
# (the README passes the brand labelColor and the base64 data-URI form of
# .github/badges/ardd-icon.svg, per upstream templates/badge.md's renderer
# caveat). The other keys are emitted anyway, matching upstream's payload
# field-for-field, so the file stays a valid shields.io endpoint payload and
# switching renderers is a one-line README change. Be aware the `channel`
# colouring is inert as currently rendered.
#
# .github/badges/ardd-icon.svg is the source of truth for the mark: this
# workflow inlines it as logoSvg, and the README's `logo=` param is its
# base64 form. Regenerate that param with:
#     base64 < .github/badges/ardd-icon.svg
# if the icon ever changes.
#
# Either way this renders only for public repos — the badge service fetches
# raw.githubusercontent.com unauthenticated.
on:
  push:
    branches: [main]
    paths:
      - '.project/ardd-version.md'
  workflow_dispatch:

jobs:
  sync-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Admin PAT so the sync commit can push past the branch ruleset
          # ("changes must be made through a pull request" + required `ci`
          # check). The default GITHUB_TOKEN cannot bypass it — that is why
          # this workflow silently failed on every bump before, leaving the
          # badge pinned at a stale version. Same pattern as publish.yml.
          token: ${{ secrets.GH_PAT }}

      - name: Regenerate badge JSON
        run: |
          set -e
          VF=".project/ardd-version.md"
          OUT=".github/badges/ardd-version.json"

          # Same sed-based read style install.sh/ardd-update-check.sh/
          # source-resolve.sh already use for this file. Prefer the
          # human-readable Source-Ref (a release tag); fall back to a short
          # Source-Commit prefix when no tag is recorded (dev-mode/
          # no-releases-yet installs).
          ref="$(sed -n 's/^Source-Ref: //p' "$VF" | head -1)"
          commit="$(sed -n 's/^Source-Commit: //p' "$VF" | head -1)"
          channel="$(sed -n 's/^Channel: //p' "$VF" | head -1)"
          [ -n "$channel" ] || channel="stable"

          if [ -n "$ref" ]; then
            message="$ref"
          elif [ -n "$commit" ]; then
            message="$(printf '%s' "$commit" | cut -c1-7)"
          else
            message="dev"
          fi

          case "$channel" in
            beta) color="yellow" ;;
            *) color="blue" ;;
          esac

          # Inline the mark verbatim as a JSON string, exactly as upstream's
          # template does: escape backslashes and quotes, then join lines
          # with literal \n.
          logo="$(awk 'BEGIN{ORS=""} {gsub(/\\/,"\\\\"); gsub(/"/,"\\\""); print $0 "\\n"}' .github/badges/ardd-icon.svg)"

          mkdir -p "$(dirname "$OUT")"
          # Heredoc body must stay indented inside this block scalar: YAML
          # strips the block indentation before the shell sees it, so the
          # JSON lands at column 0 and the JSON terminator still matches.
          # Upstream's template has these at column 0 in the YAML itself,
          # which ends the `run: |` block and makes the file unparseable.
          cat > "$OUT" <<JSON
          {
            "schemaVersion": 1,
            "label": "built with ArDD",
            "message": "$message",
            "color": "$color",
            "labelColor": "#7C3AED",
            "logoSvg": "$logo"
          }
          JSON

      - name: Commit if changed
        run: |
          set -e
          if git diff --quiet -- .github/badges/ardd-version.json; then
            echo "No change to .github/badges/ardd-version.json — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/ardd-version.json
          git commit -m "chore: sync ArDD version badge [skip ci]"
          git push
