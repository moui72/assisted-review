name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # semantic-release needs full history to find previous tags
          # Admin PAT so @semantic-release/git can push the release commit past the
          # branch ruleset (the default GITHUB_TOKEN cannot bypass it on a user repo).
          token: ${{ secrets.GH_PAT }}

      - uses: pnpm/action-setup@v6

      # Trusted publishing requires Node 22.14.0+ and npm 11.5.1+
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # Pinned, not `npm@latest` — that floated onto a broken 12.0.0 prerelease
      # missing the `sigstore` dependency its provenance path requires,
      # breaking `npm publish` (https://github.com/npm/cli/issues/9722).
      - name: Upgrade npm
        run: npm install -g npm@11.18.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install semantic-release plugins
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git

      - name: Release
        run: semantic-release
        env:
          # PAT is used for the git push and the GitHub Releases API.
          # npm publishing still uses OIDC trusted publishing (id-token), not this.
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
