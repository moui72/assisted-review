# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
tone_instructions: >-
  Be direct and specific. Cite file:line. Skip praise and restatement; if a
  change is fine, say nothing about it.

reviews:
  profile: chill
  high_level_summary: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - main

  path_filters:
    # Generated or vendored — never worth a review comment.
    - "!build/**"
    - "!web/dist/**"
    - "!**/*.lock"
    - "!package-lock.json"
    # ArDD artifacts are maintained by the /ardd-* skills against their own
    # schema and consistency checks (see .claude/skills/, CLAUDE.md). A
    # general-purpose reviewer has no way to know those rules and reliably
    # produces noise here.
    - "!.project/**"
    - "!.claude/**"

  path_instructions:
    - path: "src/**/*.ts"
      instructions: >-
        Backend is ESM with NodeNext resolution: relative imports MUST carry an
        explicit .js extension even though the source is .ts (e.g.
        `from './types.js'`). Flag any extensionless relative import. Node
        built-ins must use the `node:` prefix. `strict: true` and no `any` —
        flag every `any`, including implicit ones and `as any` casts.

    - path: "src/state.ts"
      instructions: >-
        Two invariants here. (1) `applyAction` must be pure: takes state +
        action, returns new state, never mutates its input — flag in-place
        array/object mutation (push, splice, direct property assignment on the
        passed state). (2) `saveState` must write atomically: write to a .tmp
        file then `rename()` onto the target. Flag any direct write to the
        target path.

    - path: "src/server.ts"
      instructions: >-
        The server binds to 127.0.0.1 only and must never be exposed
        off-machine — flag any change to the bind address or anything that
        would widen it. Hosted multi-user deployment is a possible future
        direction but NOT a current requirement: don't suggest building for it.
        Do flag new state added to the global `AppContext { review, state }`
        singleton that assumes exactly one active review process-wide, when a
        per-request/per-session shape would be just as simple today.

    - path: "web/src/**/*.{ts,tsx}"
      instructions: >-
        Frontend imports MUST use explicit .ts/.tsx extensions — required by
        tsconfig and Vite. `dangerouslySetInnerHTML` is permitted ONLY for
        sanitized hljs output or strings run through `escapeHtml`; flag any
        other use, especially raw user or API content. There is no
        tailwind.config.js and one must not be created — theming goes through
        CSS custom properties in web/src/index.css, mapped by `@theme inline`.
        No `any`.

    - path: "tests/**/*.ts"
      instructions: >-
        Backend statement and line coverage must stay above 90% (per-glob
        threshold in vitest.config.ts). External CLIs (gh, glab, op, claude)
        and node:child_process are mocked via module mocks; HTTP is stubbed
        with `vi.spyOn(globalThis, 'fetch')` — flag tests that would shell out
        or hit the network for real. Component tests live in tests/components/
        and need a `// @vitest-environment jsdom` docblock.

    - path: "**/*.md"
      instructions: >-
        Prose only. Do not flag style, tone, or heading structure. Flag only
        statements that contradict the code.

  # Nested under `reviews`, not top-level — a top-level `tools:` key parses as
  # valid YAML but CodeRabbit silently ignores it (confirmed via schema.v2.json).
  tools:
    eslint:
      enabled: true
    semgrep:
      enabled: true
    actionlint:
      enabled: true
    markdownlint:
      enabled: false
    # Their runner currently fails to import checkov (ModuleNotFoundError),
    # which surfaces as a tool-failure warning on every PR. No IaC here anyway.
    checkov:
      enabled: false

chat:
  auto_reply: true
